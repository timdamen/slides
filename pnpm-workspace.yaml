packages:
  - packages/*
  - presentations/*

catalog:
  '@iconify-json/logos': ^1.2.11
  '@slidev/cli': ^52.11.3
  '@slidev/theme-apple-basic': latest
  '@slidev/theme-default': latest
  '@slidev/theme-seriph': latest
  playwright-chromium: ^1.58.2
  vue: ^3.5.26

catalogMode: prefer

catalogs:
  core:
    '@vue/compiler-sfc': ^3.5.27
    nuxt: ^4.4.2
    typescript: ^5.3.3
    vue-tsc: ^2.0.0

linkWorkspacePackages: true

shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - axios
  - chokidar
  - semver
  - undici
  - undici-types
  - vite
